name: Documentation

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Validate documentation and relative links
        run: |
          mkdir -p evidence/documentation
          python scripts/validate_documentation.py 2>&1 | tee evidence/documentation/validation.log

      - name: Record exact-head evidence
        if: always()
        run: |
          mkdir -p evidence/documentation
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > evidence/documentation/exact-head.txt
          python --version > evidence/documentation/python-version.txt 2>&1
          find README.md docs release.md changelog.md scripts/validate_documentation.py -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum > evidence/documentation/source-SHA256SUMS
          find evidence/documentation -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > evidence/documentation/SHA256SUMS

      - name: Upload documentation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: documentation-evidence-${{ github.event.pull_request.head.sha || github.sha }}
          path: evidence/documentation
          if-no-files-found: error
          retention-days: 90
