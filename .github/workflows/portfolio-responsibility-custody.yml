name: Portfolio Responsibility Custody Parity

on:
  pull_request:
    branches: [main]
    paths:
      - 'fixtures/portfolio-responsibility-custody-v1.json'
      - 'scripts/validate_portfolio_responsibility_fixtures.py'
      - 'tests/test_portfolio_responsibility_contract.py'
      - '.github/workflows/portfolio-responsibility-custody.yml'
  push:
    branches: [main]
    paths:
      - 'fixtures/portfolio-responsibility-custody-v1.json'
      - 'scripts/validate_portfolio_responsibility_fixtures.py'
      - 'tests/test_portfolio_responsibility_contract.py'
      - '.github/workflows/portfolio-responsibility-custody.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-responsibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EXPECTED_FIXTURE_SHA256: 299e2542d729bf30fabac1c08d0c2ecd8d21f655d190013419e205fba28ebd8f

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Assert immutable clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          test -f fixtures/portfolio-responsibility-custody-v1.json
          test -f scripts/validate_portfolio_responsibility_fixtures.py
          test -f tests/test_portfolio_responsibility_contract.py

      - name: Run hostile responsibility regressions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/portfolio-responsibility
          python -m unittest tests.test_portfolio_responsibility_contract -v \
            2>&1 | tee evidence/portfolio-responsibility/tests.log

      - name: Validate shared corpus independently
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_portfolio_responsibility_fixtures.py \
            --fixture fixtures/portfolio-responsibility-custody-v1.json \
            --expected-sha256 "$EXPECTED_FIXTURE_SHA256" \
            --report evidence/portfolio-responsibility/validation.json \
            2>&1 | tee evidence/portfolio-responsibility/validation.log

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/portfolio-responsibility
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'submitted_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'expected_fixture_sha256=%s\n' "$EXPECTED_FIXTURE_SHA256"
            printf 'independent_implementation=true\n'
            printf 'synthetic_only=true\n'
            printf 'operational_authority=false\n'
            printf 'python=%s\n' "$(python --version 2>&1)"
          } > evidence/portfolio-responsibility/run-summary.txt
          git status --porcelain > evidence/portfolio-responsibility/worktree.txt
          sha256sum \
            fixtures/portfolio-responsibility-custody-v1.json \
            scripts/validate_portfolio-responsibility_fixtures.py \
            tests/test_portfolio_responsibility_contract.py \
            .github/workflows/portfolio-responsibility-custody.yml \
            > evidence/portfolio-responsibility/source.sha256
          find evidence/portfolio-responsibility -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > evidence/portfolio-responsibility/SHA256SUMS

      - name: Upload retained evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: portfolio-responsibility-${{ env.SUBMITTED_SHA }}
          path: evidence/portfolio-responsibility
          if-no-files-found: error
          retention-days: 90
