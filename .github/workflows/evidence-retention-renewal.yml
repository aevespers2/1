name: Evidence Retention Renewal Parity

on:
  pull_request:
    branches: [main]
    paths:
      - 'contracts/evidence-retention-source-tuple-v1.json'
      - 'docs/EVIDENCE_RETENTION_RENEWAL_CONFORMANCE.md'
      - 'docs/index.md'
      - 'scripts/verify_evidence_retention_source_tuple.py'
      - 'scripts/validate_evidence_retention_renewal.py'
      - 'tests/test_evidence_retention_source_tuple.py'
      - 'tests/test_evidence_retention_renewal_contract.py'
      - '.github/workflows/evidence-retention-renewal.yml'
      - 'taskchain.md'
      - 'punchlist.md'
      - 'release.md'
      - 'changelog.md'
  push:
    branches: [main]
    paths:
      - 'contracts/evidence-retention-source-tuple-v1.json'
      - 'docs/EVIDENCE_RETENTION_RENEWAL_CONFORMANCE.md'
      - 'docs/index.md'
      - 'scripts/verify_evidence_retention_source_tuple.py'
      - 'scripts/validate_evidence_retention_renewal.py'
      - 'tests/test_evidence_retention_source_tuple.py'
      - 'tests/test_evidence_retention_renewal_contract.py'
      - '.github/workflows/evidence-retention-renewal.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidence-retention-parity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  independent-consumer:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PRODUCER_COMMIT: 155437912906a0119a087d63bf4ed889368a4a9f
      EXPECTED_GIT_BLOB: f624abed1f72fbb7e6f2dbe5b443cce891abc05c
      EXPECTED_SHA256: 9d4c78fc8c9b54a91bd272a4bc929dc368d3af23b62cf2eec1d833b9a7ec449f
      PRODUCER_URL: https://raw.githubusercontent.com/aevespers2/qso-field.github.io/155437912906a0119a087d63bf4ed889368a4a9f/fixtures/evidence-retention-renewal-v1.json
      EVIDENCE_RETENTION_FIXTURE: evidence/retention/producer-fixture.json
      SOURCE_TUPLE: contracts/evidence-retention-source-tuple-v1.json

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          test -f "$SOURCE_TUPLE"
          test -f docs/EVIDENCE_RETENTION_RENEWAL_CONFORMANCE.md
          test -f docs/index.md
          test -f scripts/verify_evidence_retention_source_tuple.py
          test -f scripts/validate_evidence_retention_renewal.py
          test -f tests/test_evidence_retention_source_tuple.py
          test -f tests/test_evidence_retention_renewal_contract.py

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Retrieve immutable producer corpus
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/retention
          curl --proto '=https' --tlsv1.2 --fail --location \
            --retry 2 --retry-all-errors --max-time 30 \
            "$PRODUCER_URL" --output "$EVIDENCE_RETENTION_FIXTURE"
          actual_blob="$(git hash-object "$EVIDENCE_RETENTION_FIXTURE")"
          actual_sha256="$(sha256sum "$EVIDENCE_RETENTION_FIXTURE" | cut -d' ' -f1)"
          test "$actual_blob" = "$EXPECTED_GIT_BLOB"
          test "$actual_sha256" = "$EXPECTED_SHA256"
          {
            printf 'producer_commit=%s\n' "$PRODUCER_COMMIT"
            printf 'producer_url=%s\n' "$PRODUCER_URL"
            printf 'expected_git_blob=%s\n' "$EXPECTED_GIT_BLOB"
            printf 'actual_git_blob=%s\n' "$actual_blob"
            printf 'expected_sha256=%s\n' "$EXPECTED_SHA256"
            printf 'actual_sha256=%s\n' "$actual_sha256"
          } | tee evidence/retention/producer-source.txt

      - name: Test source and evidence tuple boundary
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest tests.test_evidence_retention_source_tuple -v \
            2>&1 | tee evidence/retention/source-tuple-tests.log

      - name: Verify source tuple before semantic parsing
        shell: bash
        run: |
          set -euo pipefail
          as_of="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/verify_evidence_retention_source_tuple.py \
            --tuple "$SOURCE_TUPLE" \
            --fixture "$EVIDENCE_RETENTION_FIXTURE" \
            --as-of "$as_of" \
            --report evidence/retention/source-tuple-validation.json \
            2>&1 | tee evidence/retention/source-tuple-validation.log

      - name: Run independent hostile regressions
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest tests.test_evidence_retention_renewal_contract -v \
            2>&1 | tee evidence/retention/tests.log

      - name: Validate producer corpus independently
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_evidence_retention_renewal.py \
            --fixture "$EVIDENCE_RETENTION_FIXTURE" \
            --report evidence/retention/validation.json \
            2>&1 | tee evidence/retention/validation.log

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/retention
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'consumer_source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'python=%s\n' "$(python --version 2>&1)"
            printf 'independent_consumer=true\n'
            printf 'source_tuple_verified_before_semantic_parse=true\n'
            printf 'archive_operation=false\n'
            printf 'renewal_authority=false\n'
            printf 'deletion_authority=false\n'
            printf 'claim_or_publication_authority=false\n'
            printf 'operational_authority=false\n'
          } | tee evidence/retention/source-identity.txt
          sha256sum \
            contracts/evidence-retention-source-tuple-v1.json \
            docs/EVIDENCE_RETENTION_RENEWAL_CONFORMANCE.md \
            docs/index.md \
            scripts/verify_evidence_retention_source_tuple.py \
            scripts/validate_evidence_retention_renewal.py \
            tests/test_evidence_retention_source_tuple.py \
            tests/test_evidence_retention_renewal_contract.py \
            .github/workflows/evidence-retention-renewal.yml \
            > evidence/retention/consumer-source.sha256
          find evidence/retention -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z | xargs -0 sha256sum > evidence/retention/SHA256SUMS

      - name: Upload retained evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: evidence-retention-renewal-${{ env.SUBMITTED_SHA }}
          path: evidence/retention
          if-no-files-found: error
          retention-days: 90
