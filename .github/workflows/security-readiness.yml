name: Security Readiness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  safeguards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pinned test dependency
        run: python -m pip install --disable-pip-version-check 'pytest==8.4.2'

      - name: Run safeguard tests
        run: python -m pytest -q

      - name: Confirm example evidence remains blocked
        run: |
          set +e
          python -m partitioned_versioning.readiness_cli evidence/token-readiness.example.json --pretty
          status=$?
          set -e
          test "$status" -eq 2
