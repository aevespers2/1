name: Security Readiness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  safeguards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run safeguard tests
        run: python -m pytest -q
      - name: Confirm example evidence remains blocked
        run: |
          set +e
          python -m partitioned_versioning.readiness_cli evidence/token-readiness.example.json --pretty
          status=$?
          set -e
          test "$status" -eq 2
