name: Security Readiness

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  safeguards:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact source
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha || github.sha }}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install pinned test dependency
        run: python -m pip install --disable-pip-version-check 'pytest==8.4.2'

      - name: Run safeguard tests
        run: |
          mkdir -p evidence/ci
          python -m pytest -q --junitxml=evidence/ci/pytest.xml | tee evidence/ci/pytest.log

      - name: Confirm example evidence remains blocked
        run: |
          set +e
          python -m partitioned_versioning.readiness_cli evidence/token-readiness.example.json --pretty | tee evidence/ci/readiness-example.json
          status=${PIPESTATUS[0]}
          set -e
          test "$status" -eq 2

      - name: Record exact-head evidence
        if: always()
        run: |
          mkdir -p evidence/ci
          printf '%s\n' "${{ github.event.pull_request.head.sha || github.sha }}" > evidence/ci/exact-head.txt
          python --version > evidence/ci/python-version.txt 2>&1
          python -m pytest --version > evidence/ci/pytest-version.txt 2>&1
          sha256sum evidence/ci/* > evidence/ci/SHA256SUMS

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-readiness-${{ github.event.pull_request.head.sha || github.sha }}
          path: evidence/ci
          if-no-files-found: error
          retention-days: 90
