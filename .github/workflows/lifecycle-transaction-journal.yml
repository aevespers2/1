name: Lifecycle Transaction Journal Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - 'fixtures/constitutional-lifecycle-transaction-journal-v1.json'
      - 'scripts/validate_constitutional_lifecycle_transaction_journal.py'
      - 'tests/test_constitutional_lifecycle_journal_contract.py'
      - 'scripts/validate_constitutional_lifecycle_snapshot_compaction.py'
      - 'tests/snapshot_compaction_contract.py'
      - '.github/workflows/lifecycle-transaction-journal.yml'
  push:
    branches: [main]
    paths:
      - 'fixtures/constitutional-lifecycle-transaction-journal-v1.json'
      - 'scripts/validate_constitutional_lifecycle_transaction_journal.py'
      - 'tests/test_constitutional_lifecycle_journal_contract.py'
      - 'scripts/validate_constitutional_lifecycle_snapshot_compaction.py'
      - 'tests/snapshot_compaction_contract.py'
      - '.github/workflows/lifecycle-transaction-journal.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lifecycle-journal-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      EXPECTED_FIXTURE_SHA256: 514ff45d55ae889a534a005465f71c1c74997585e10a53de89094d7f07583dd9
      EXPECTED_SNAPSHOT_SHA256: 6b1e0177e73145572286d66e662bf498755cdbf685c05534f6e99a0d903bf140
      SNAPSHOT_SOURCE_URL: https://raw.githubusercontent.com/aevespers2/ALISTAIRE-/8c7685117d4e5ccafae1043c1ff47e9cfb20e5b5/fixtures/constitutional-lifecycle-snapshot-compaction-v1.json
      SNAPSHOT_COMPACTION_FIXTURE: evidence/lifecycle-journal/snapshot-compaction-producer-fixture.json
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Assert exact clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Run lifecycle journal regressions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/lifecycle-journal
          python -m unittest tests.test_constitutional_lifecycle_journal_contract -v \
            2>&1 | tee evidence/lifecycle-journal/tests.log

      - name: Validate shared lifecycle transaction journal independently
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_constitutional_lifecycle_transaction_journal.py \
            --fixture fixtures/constitutional-lifecycle-transaction-journal-v1.json \
            --expected-sha256 "$EXPECTED_FIXTURE_SHA256" \
            --report evidence/lifecycle-journal/validation.json \
            2>&1 | tee evidence/lifecycle-journal/validation.log

      - name: Retrieve immutable producer snapshot corpus
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/lifecycle-journal
          curl --proto '=https' --tlsv1.2 --fail --location \
            --retry 2 --retry-all-errors --max-time 30 \
            "$SNAPSHOT_SOURCE_URL" \
            --output "$SNAPSHOT_COMPACTION_FIXTURE"
          actual="$(sha256sum "$SNAPSHOT_COMPACTION_FIXTURE" | cut -d' ' -f1)"
          test "$actual" = "$EXPECTED_SNAPSHOT_SHA256"
          printf 'source_url=%s\nsha256=%s\n' "$SNAPSHOT_SOURCE_URL" "$actual" \
            > evidence/lifecycle-journal/snapshot-source.txt

      - name: Run independent snapshot and compaction regressions
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p 'snapshot_compaction_contract.py' -v \
            2>&1 | tee evidence/lifecycle-journal/snapshot-compaction-tests.log

      - name: Validate producer snapshot corpus independently
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_constitutional_lifecycle_snapshot_compaction.py \
            --fixture "$SNAPSHOT_COMPACTION_FIXTURE" \
            --expected-sha256 "$EXPECTED_SNAPSHOT_SHA256" \
            --report evidence/lifecycle-journal/snapshot-compaction-validation.json \
            2>&1 | tee evidence/lifecycle-journal/snapshot-compaction-validation.log

      - name: Record exact-head evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence/lifecycle-journal
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$(git rev-parse HEAD)"
            printf 'submitted_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
            printf 'expected_fixture_sha256=%s\n' "$EXPECTED_FIXTURE_SHA256"
            printf 'expected_snapshot_sha256=%s\n' "$EXPECTED_SNAPSHOT_SHA256"
            printf 'snapshot_source_url=%s\n' "$SNAPSHOT_SOURCE_URL"
            printf 'independent_lifecycle_journal_validation=true\n'
            printf 'independent_snapshot_compaction_validation=true\n'
            printf 'durable_journal_authority=false\n'
            printf 'appointment_authority=false\n'
            printf 'credential_authority=false\n'
            printf 'operational_authority=false\n'
            printf 'python=%s\n' "$(python --version 2>&1)"
          } > evidence/lifecycle-journal/run-summary.txt
          git status --porcelain > evidence/lifecycle-journal/worktree.txt
          sha256sum \
            fixtures/constitutional-lifecycle-transaction-journal-v1.json \
            scripts/validate_constitutional_lifecycle_transaction_journal.py \
            tests/test_constitutional_lifecycle_journal_contract.py \
            scripts/validate_constitutional_lifecycle_snapshot_compaction.py \
            tests/snapshot_compaction_contract.py \
            .github/workflows/lifecycle-transaction-journal.yml \
            > evidence/lifecycle-journal/source.sha256
          find evidence/lifecycle-journal -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            | xargs -0 sha256sum > evidence/lifecycle-journal/SHA256SUMS

      - name: Upload lifecycle journal evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lifecycle-journal-${{ env.SUBMITTED_SHA }}
          path: evidence/lifecycle-journal
          if-no-files-found: error
          retention-days: 90
